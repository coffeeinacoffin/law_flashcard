<style>
:root{--bg1:#1a237e;--bg2:#283593;--teal1:#0d5c4e;--teal2:#1a7a67;--pur1:#3b0764;--pur2:#6d28d9}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo',sans-serif;min-height:100vh;background:var(--bg1)}
button{cursor:pointer;border:none;font-family:inherit;outline:none;transition:opacity .15s}
button:active{opacity:.7}
textarea,input,select{font-family:inherit;outline:none}
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px 40px}
.gbg{background:linear-gradient(135deg,var(--bg1),var(--bg2))}
.tbg{background:linear-gradient(135deg,var(--teal1),var(--teal2))}
.pbg{background:linear-gradient(135deg,var(--pur1),var(--pur2))}
.dbg{background:linear-gradient(135deg,#0f172a,#1e293b)}
.card{background:#fff;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.25);padding:28px;width:100%;max-width:520px}
.card-sm{max-width:440px}
.btn{border-radius:14px;padding:13px 16px;font-weight:700;font-size:15px;width:100%;display:block;text-align:center}
.inp{width:100%;border:2px solid #e5e7eb;border-radius:14px;padding:12px 16px;font-size:14px;background:#fff;transition:border-color .2s}
.inp:focus{border-color:#a5b4fc}
.tag{font-size:11px;font-weight:700;padding:4px 12px;border-radius:99px;display:inline-block}
.kw{background:rgba(255,255,255,.2);color:#fff;font-size:11px;padding:4px 12px;border-radius:99px;display:inline-block}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.flip-box{perspective:1200px}
.flip-inner{transition:transform .5s;-webkit-transition:-webkit-transform .5s;transform-style:preserve-3d;-webkit-transform-style:preserve-3d;position:relative;width:100%;height:100%}
.flip-inner.flipped{transform:rotateY(180deg);-webkit-transform:rotateY(180deg)}
.flip-f,.flip-b{-webkit-backface-visibility:hidden;backface-visibility:hidden;position:absolute;inset:0;border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;overflow:auto;text-align:center}
.flip-b{transform:rotateY(180deg);-webkit-transform:rotateY(180deg)}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 22px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
/* 캘린더 */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-cell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:600}
/* 스트릭 */
.streak{background:linear-gradient(135deg,#ff6b35,#f7931e);color:#fff;border-radius:16px;padding:14px 20px;display:flex;align-items:center;gap:12px;margin-bottom:12px}
/* 홈 메뉴 버튼 */
.menu-btn{border-radius:20px;padding:18px;display:flex;align-items:center;gap:14px;width:100%;text-align:left;margin-bottom:10px;font-weight:700;font-size:16px}
.menu-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
</style>
</head>

  {question:"548조 1항 단서로 보호되는 제3자는 해제 전 이해관계를 가지고 완전한 권리를 취득한 자. 그렇다면 해제 이후 이해관계를 가진 제3자는?",answer:"해제 후 원상회복 등기 전에 이해관계 가졌고 해제 사실 몰랐던 선의의 제3자에 대해서는 해제를 주장할 수 없고, 악의의 주장 및 입증책임은 해제주장자에게 있음",type:"판례",keywords:"계약해제, 민사법, 선의의제3자, 채권법",explanation:"2005다6341",hint:"제3자 범위 확대"},

  {question:"201조 1항 선의점유자의 과실수취권 — 건물을 법률상 원인없이 선의로 점유·사용한 경우 및 '선의'의 의미",answer:"건물의 사용이익은 건물의 과실에 준하기 때문에 점유·사용이득의 반환의무 없음. 선의는 과실취득권 포함하는 권원이 있다고 오신하는 점유자로 그 오신에 근거가 있어야 함.",type:"판례",keywords:"물권법, 민사법, 부당이득반환, 점유",explanation:"",hint:""},

function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.style.opacity="1";clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity="0",2500)}
function todayStr(){return new Date().toISOString().split("T")[0]}
function speak(text){try{if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang="ko-KR";u.rate=0.88;setTimeout(()=>window.speechSynthesis.speak(u),100)}catch(e){}}
function typeColor(t){const m={객관식:["#ede9fe","#6d28d9"],판례:["#fef3c7","#b45309"],요건:["#dbeafe","#1d4ed8"],기타:["#f3f4f6","#374151"]};return m[t]||m["기타"]}

// SM-2
function sm2(correct,interval,ef){
  if(!correct)return{interval:1,ef:Math.max(1.3,(ef||2.5)-.2),next:daysAdd(1)};
  const ni=!interval?1:interval===1?3:Math.round(interval*(ef||2.5));
  return{interval:ni,ef:Math.min(3.0,(ef||2.5)+.1),next:daysAdd(ni)};
}
function daysAdd(d){const dt=new Date();dt.setDate(dt.getDate()+d);dt.setHours(0,0,0,0);return dt.toISOString().split("T")[0]}

// ── 카드 선발
function pickCards(cards,prog){
  const today=todayStr();
  const due=cards.filter(c=>{
    const p=prog[c.id];
    if(!p)return true;
    if((p.correct||0)>=PASS)return false;
    return(p.nextDate||"0000-00-00")<=today;
  });
  if(!due.length)return[];
  const byType={};
  due.forEach(c=>{const t=c.type||"기타";if(!byType[t])byType[t]=[];byType[t].push(c)});
  const sel=new Set();const types=Object.keys(byType);let i=0;
  while(sel.size<Math.min(SESSION_SIZE,due.length)){
    const t=types[i%types.length];
    const pool=byType[t].filter(c=>!sel.has(c.id));
    if(pool.length){pool.sort((a,b)=>((prog[a.id]||{correct:0}).correct)-((prog[b.id]||{correct:0}).correct));sel.add(pool[0].id)}
    i++;if(i>types.length*30)break;
  }
  return due.filter(c=>sel.has(c.id)).sort(()=>Math.random()-.5);
}

// ── AI 채점
function judgeAnswer(q,a,ua,kw,cb){
  const prompt=`당신은 법학 시험 채점관입니다.\n문제: ${q}\n모범답안: ${a}\n관련 키워드: ${kw||"없음"}\n수험생 답변: ${ua}\n채점 기준: 핵심 키워드와 개념 포함 시 정답, 완벽한 문장 불필요, 법적 의미 동일 시 정답.\n반드시 아래 JSON만 응답 (코드블록 없이):\n{"correct":true,"feedback":"피드백","missing":"빠진개념"}`;
  const xhr=new XMLHttpRequest();
  xhr.open("POST","https://api.anthropic.com/v1/messages",true);
  xhr.setRequestHeader("Content-Type","application/json");
  xhr.setRequestHeader("x-api-key",APIKEY);
  xhr.setRequestHeader("anthropic-version","2023-06-01");
  xhr.setRequestHeader("anthropic-dangerous-direct-browser-access","true");
  xhr.onreadystatechange=function(){
    if(xhr.readyState!==4)return;
    try{const data=JSON.parse(xhr.responseText);const text=(data.content||[]).map(c=>c.text||"").join("");cb(null,JSON.parse(text.replace(/```json|```/g,"").trim()))}
    catch(e){cb(null,{correct:false,feedback:"채점 오류",missing:""})}
  };
  xhr.onerror=()=>cb(null,{correct:false,feedback:"네트워크 오류",missing:""});
  xhr.send(JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,messages:[{role:"user",content:prompt}]}));
}

async function logStudySession(correct,total){
  const today=todayStr();
  const ref=doc(db,"users",uid(),"studyLog",today);
  const prev=S.studyLog[today]||{sessions:0,correct:0,total:0};
  const updated={sessions:prev.sessions+1,correct:prev.correct+correct,total:prev.total+total,date:today,lastUpdated:serverTimestamp()};
  await setDoc(ref,updated,{merge:true});
  S.studyLog[today]=updated;
  // myplanner 연동 경로에도 저장

}

  const pool=[...S.cards].sort(()=>Math.random()-.5);

  setTimeout(()=>speak(pool[0].question),400);
}
function submitAnswer(){
  const s=S.session;
  if(!s.userInput.trim()||s.judging)return;
  s.judging=true;render();
  const card=s.cards[s.idx];
  judgeAnswer(card.question,card.answer,s.userInput,card.keywords,(err,result)=>{
    s.judging=false;s.answered=true;s.result=result;s.confirmed=false;s.finalCorrect=null;render();
  });
}
async function confirmAnswer(correct){
  const s=S.session;const card=s.cards[s.idx];
  const prev=S.progress[card.id]||{attempts:0,correct:0,interval:0,ef:2.5};
  const r=sm2(correct,prev.interval||0,prev.ef||2.5);
  const np={attempts:(prev.attempts||0)+1,correct:(prev.correct||0)+(correct?1:0),interval:r.interval,ef:r.ef,nextDate:r.next,lastAttempt:todayStr()};
  S.progress[card.id]=np;
  s.confirmed=true;s.finalCorrect=correct;
  if(correct)s.sessionCorrect=(s.sessionCorrect||0)+1;
  render();
  await setDoc(doc(db,"users",uid(),"progress",card.id),np,{merge:true});
}
function nextCard(){
  const s=S.session;
  if(s.idx+1>=s.cards.length){
    logStudySession(s.sessionCorrect||0,s.cards.length);
    set({screen:"done"});return;
  }
  s.idx++;s.answered=false;s.result=null;s.confirmed=false;s.finalCorrect=null;s.showHint=false;s.userInput="";render();
}
async function saveCard(fd){
  set({loading:true});
  try{
    if(S.editCard&&S.editCard.id){
      await updateDoc(doc(db,"users",uid(),"cards",S.editCard.id),fd);
      const i=S.cards.findIndex(c=>c.id===S.editCard.id);
      if(i>=0)S.cards[i]={...S.cards[i],...fd};
      toast("✅ 문제 수정 완료");
    }else{
      const ref=await addDoc(cardsRef(),{...fd,createdAt:serverTimestamp(),starred:false});
      S.cards.push({id:ref.id,...fd,starred:false});
      toast("✅ 문제 추가 완료");
    }
    set({screen:"manage",editCard:null,loading:false});
  }catch(e){toast("오류: "+e.message);set({loading:false})}
}
async function removeCard(id){
  if(!confirm("이 문제를 삭제하시겠습니까?"))return;
  await deleteDoc(doc(db,"users",uid(),"cards",id));
  await deleteDoc(doc(db,"users",uid(),"progress",id));
  S.cards=S.cards.filter(c=>c.id!==id);delete S.progress[id];
  toast("🗑 삭제 완료");render();
}
async function toggleStar(id){
  const c=S.cards.find(c=>c.id===id);if(!c)return;
  c.starred=!c.starred;
  await updateDoc(doc(db,"users",uid(),"cards",id),{starred:c.starred});
  render();
}

// CSV Export/Import
function exportCSV(data,filename){
  const rows=[["문제","정답","유형","키워드","해설","힌트"],...data.map(c=>[c.question,c.answer,c.type,c.keywords,c.explanation,c.hint])];
  const csv=rows.map(r=>r.map(v=>'"'+(String(v||"").replace(/"/g,'""'))+'"').join(",")).join("\n");
  const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(csv);a.download=filename;a.click();
}
function exportLogCSV(){
  const rows=[["날짜","세션수","정답","총문제"],...Object.values(S.studyLog).sort((a,b)=>a.date<b.date?-1:1).map(l=>[l.date,l.sessions,l.correct,l.total])];
  const csv=rows.map(r=>r.map(v=>'"'+String(v||"")+'"').join(",")).join("\n");
  const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(csv);a.download="study_log.csv";a.click();
}
async function importCSV(file,type){
  const text=await file.text();
  const lines=text.trim().split("\n").slice(1);
  if(type==="cards"){
    const batch=writeBatch(db);const newCards=[];
    lines.forEach(line=>{
      const cols=line.match(/(".*?"|[^,]+)(?=,|$)/g)||[];
      const v=cols.map(c=>c.replace(/^"|"$/g,"").replace(/""/g,'"'));
      if(!v[0]||!v[1])return;
      const r=doc(cardsRef());
      const c={question:v[0],answer:v[1],type:v[2]||"기타",keywords:v[3]||"",explanation:v[4]||"",hint:v[5]||"",createdAt:serverTimestamp(),starred:false};
      batch.set(r,c);newCards.push({id:r.id,...c});
    });
    await batch.commit();S.cards=[...S.cards,...newCards];toast("✅ "+newCards.length+"개 문제 가져오기 완료");render();
  }
}

// ══════════ DOM 헬퍼
function el(tag,attrs={},ch=[]){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")e.className=v;
    else e.setAttribute(k,v);
  }
  for(const c of(Array.isArray(ch)?ch:[ch])){
    if(c==null||c===false||c===undefined)continue;
    e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  }
  return e;
}

          el("span",{style:{fontSize:"10px",color:"#94a3b8"}},prog.correct+"/"+PASS),
          c.starred?el("span",{style:{fontSize:"12px"}},"⭐"):null
        ]),
        p(c.question,{fontSize:"13px",color:"#1e293b",lineHeight:"1.4",overflow:"hidden",display:"-webkit-box",WebkitLineClamp:"2",WebkitBoxOrient:"vertical"})
      ]),
      el("div",{style:{display:"flex",gap:"4px",flexShrink:0}},[
        el("button",{style:{background:"#eef2ff",color:"#4f46e5",border:"none",borderRadius:"8px",padding:"5px 8px",fontSize:"12px",fontWeight:"700",cursor:"pointer"},onClick:()=>set({screen:"add",editCard:c})},"수정"),
        el("button",{style:{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:"8px",padding:"5px 8px",fontSize:"12px",fontWeight:"700",cursor:"pointer"},onClick:()=>removeCard(c.id)},"삭제")
      ])
    ]);
  });

  return div("page gbg",[
    div("card",{style:{maxWidth:"520px",margin:"auto"}},[
      el("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"16px"}},[
        el("button",{style:{background:"#f1f5f9",border:"none",borderRadius:"10px",padding:"8px 14px",fontSize:"13px",fontWeight:"700",cursor:"pointer"},onClick:()=>set({screen:"home"})},"← 뒤로"),
        el("h2",{style:{fontSize:"18px",fontWeight:"800",color:"#1e293b",flex:"1"}},"문제 관리 ("+S.cards.length+"개)")
      ]),
      toolbar,
      S.cards.length===0?p("문제가 없습니다. ➕ 추가로 시작해보세요!",{color:"#94a3b8",textAlign:"center",padding:"32px 0"}):el("div",{style:{maxHeight:"60vh",overflowY:"auto"}},rows)
    ])
  ]);
}

function renderAddEdit(){
  const isEdit=!!(S.editCard&&S.editCard.id);
  const c=S.editCard||{};
  let form={question:c.question||"",answer:c.answer||"",type:c.type||"판례",keywords:c.keywords||"",explanation:c.explanation||"",hint:c.hint||""};
  function field(label,key,multi=false,rows=2){
    const wrap=el("div",{style:{marginBottom:"12px"}});
    wrap.appendChild(el("label",{style:{fontSize:"12px",fontWeight:"700",color:"#64748b",display:"block",marginBottom:"4px"}},label));
    const inp2=multi?el("textarea",{className:"inp",rows:String(rows),style:{resize:"vertical",lineHeight:"1.6"}}):el("input",{className:"inp",type:"text"});
    inp2.value=form[key];inp2.addEventListener("input",e=>form[key]=e.target.value);
    wrap.appendChild(inp2);return wrap;
  }
  const sel=el("div",{style:{marginBottom:"12px"}});
  sel.appendChild(el("label",{style:{fontSize:"12px",fontWeight:"700",color:"#64748b",display:"block",marginBottom:"4px"}},"유형"));
  const s2=el("select",{className:"inp"});
  ["객관식","판례","요건","기타"].forEach(t=>{const o=el("option",{value:t},t);if(t===form.type)o.selected=true;s2.appendChild(o)});
  s2.addEventListener("change",e=>form.type=e.target.value);sel.appendChild(s2);

  return div("page pbg",[
    div("card",{style:{maxWidth:"520px",margin:"auto"}},[
      el("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"20px"}},[
        el("span",{style:{fontSize:"22px"}},isEdit?"✏️":"➕"),
        el("h2",{style:{fontSize:"18px",fontWeight:"800",color:"#1e293b",flex:"1"}},isEdit?"문제 수정":"새 문제 추가")
      ]),
      field("문제 (앞면)","question",true,3),
      field("정답 (뒷면)","answer",true,4),
      sel,
      field("키워드 (쉼표로 구분)","keywords"),
      field("해설","explanation",true,3),
      field("힌트","hint"),
      btn(isEdit?"수정 완료":"문제 추가","#7c3aed","#fff",()=>{
        if(!form.question.trim()||!form.answer.trim()){toast("문제와 정답은 필수입니다.");return}
        saveCard(form);
      },{borderRadius:"14px",marginBottom:"8px"}),
      btn("취소","#f1f5f9","#374151",()=>set({screen:isEdit?"manage":"home",editCard:null}),{borderRadius:"14px",fontSize:"13px"})
    ])
  ]);
}

function renderStats(){
  const tab=S.statsTab;
  const tabs=["calendar","chart","wrong"].map(t=>
    el("button",{style:{flex:"1",padding:"10px",border:"none",borderRadius:"10px",fontWeight:"700",fontSize:"13px",cursor:"pointer",background:tab===t?"#4f46e5":"transparent",color:tab===t?"#fff":"#64748b"},onClick:()=>{S.statsTab=t;render()}},
      t==="calendar"?"📅 캘린더":t==="chart"?"📊 통계":"❌ 오답")
  );
  const tabBar=el("div",{style:{display:"flex",gap:"4px",background:"#f1f5f9",borderRadius:"14px",padding:"4px",marginBottom:"20px"}},tabs);

  let content;
  if(tab==="calendar") content=renderCalendar();
  else if(tab==="chart") content=renderChartTab();
  else content=renderWrongTab();

  const logFileInp=el("input",{type:"file",accept:".csv",style:{display:"none"}});
  const exportRow=el("div",{style:{display:"flex",gap:"8px",marginTop:"16px"}},[
    btn("📤 로그 내보내기","#f1f5f9","#374151",exportLogCSV,{flex:"1",borderRadius:"12px",padding:"10px",fontSize:"13px"}),
    logFileInp
  ]);

  return div("page dbg",[
    div("card",{style:{maxWidth:"520px",margin:"auto"}},[
      el("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"16px"}},[
        el("button",{style:{background:"#f1f5f9",border:"none",borderRadius:"10px",padding:"8px 14px",fontSize:"13px",fontWeight:"700",cursor:"pointer"},onClick:()=>set({screen:"home"})},"← 뒤로"),
        el("h2",{style:{fontSize:"18px",fontWeight:"800",color:"#1e293b",flex:"1"}},"학습 기록")
      ]),
      tabBar, content, exportRow
    ])
  ]);
}

function renderCalendar(){
  const now=new Date();const year=now.getFullYear();const month=now.getMonth();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const todayD=now.getDate();

  const header=el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}},[
    p(year+"년 "+(month+1)+"월",{fontWeight:"700",fontSize:"16px",color:"#1e293b"}),
    el("div",{style:{display:"flex",gap:"8px"}},[
      el("span",{style:{fontSize:"11px",display:"flex",alignItems:"center",gap:"4px"}},[el("span",{style:{width:"12px",height:"12px",borderRadius:"50%",background:"#22c55e",display:"inline-block"}}),"학습O"]),
      el("span",{style:{fontSize:"11px",display:"flex",alignItems:"center",gap:"4px"}},[el("span",{style:{width:"12px",height:"12px",borderRadius:"50%",background:"#f1f5f9",border:"1px solid #e2e8f0",display:"inline-block"}}),"학습X"])
    ])
  ]);

  const dayNames=["일","월","화","수","목","금","토"].map(d=>el("div",{className:"cal-cell",style:{color:"#94a3b8",aspectRatio:"auto",padding:"4px 0"}},d));
  const cells=[...dayNames];
  for(let i=0;i<firstDay;i++)cells.push(el("div",{className:"cal-cell"}));

  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const log=S.studyLog[dateStr];
    const isToday=d===todayD;
    const bg=log?"#dcfce7":isToday?"#fef3c7":"#f8fafc";
    const border=isToday?"2px solid #f59e0b":"2px solid transparent";
    cells.push(el("div",{className:"cal-cell",style:{background:bg,border,cursor:"default"}},[
      el("div",{style:{fontSize:"13px",fontWeight:isToday?"800":"500",color:log?"#15803d":"#64748b"}},d),
      el("div",{style:{fontSize:"10px",marginTop:"2px",color:log?"#15803d":"#cbd5e1"}},log?"O":"")
    ]));
  }

  const streak=calcStreak();
  const studiedDays=Object.values(S.studyLog).filter(l=>l.total>0).length;

  return el("div",null,[
    header,
    el("div",{className:"cal-grid"},cells),
    el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginTop:"16px"}},[
      el("div",{style:{background:"#fff7ed",borderRadius:"14px",padding:"14px",textAlign:"center"}},[el("div",{style:{fontSize:"24px",fontWeight:"800",color:"#ea580c"}},streak),el("div",{style:{fontSize:"12px",color:"#ea580c"}},"🔥 연속 학습일")]),
      el("div",{style:{background:"#f0fdf4",borderRadius:"14px",padding:"14px",textAlign:"center"}},[el("div",{style:{fontSize:"24px",fontWeight:"800",color:"#16a34a"}},studiedDays),el("div",{style:{fontSize:"12px",color:"#16a34a"}},"📅 총 학습일")])
    ])
  ]);
}

function renderChartTab(){
  const stats=calcStats();
  const typeStats=Object.entries(stats.byType);

  const accuracy=S.cards.length?Math.round(Object.values(S.progress).reduce((a,p)=>{if(!p.attempts)return a;return a+(p.correct/p.attempts)},0)/Math.max(1,Object.values(S.progress).filter(p=>p.attempts>0).length)*100):0;

  const totalAttempts=Object.values(S.progress).reduce((a,p)=>a+(p.attempts||0),0);
  const totalCorrect=Object.values(S.progress).reduce((a,p)=>a+(p.correct||0),0);

  const summary=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"16px"}},[
    ...[{l:"전체 문제",v:stats.total,bg:"#eff6ff",cl:"#1d4ed8"},{l:"완료",v:stats.mastered,bg:"#f0fdf4",cl:"#15803d"},{l:"평균 정답률",v:accuracy+"%",bg:"#fdf4ff",cl:"#7c3aed"}]
    .map(s=>el("div",{style:{background:s.bg,borderRadius:"14px",padding:"12px",textAlign:"center"}},[el("div",{style:{fontSize:"20px",fontWeight:"800",color:s.cl}},s.v),el("div",{style:{fontSize:"11px",color:s.cl}},s.l)]))
  ]);

  const typeRows2=el("div",null,typeStats.map(([t,d2])=>{
    const pct=d2.total?(d2.mastered/d2.total)*100:0;
    const tc=typeColor(t);
    return el("div",{style:{marginBottom:"10px"}},[
      el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"4px"}},[
        el("span",{className:"tag",style:{background:tc[0],color:tc[1]}},t),
        el("span",{style:{fontSize:"12px",color:"#64748b"}},d2.mastered+"/"+d2.total+" 완료 ("+Math.round(pct)+"%)"),
      ]),
      el("div",{style:{background:"#f1f5f9",borderRadius:"99px",height:"8px"}},[
        el("div",{style:{background:tc[1],height:"8px",borderRadius:"99px",width:pct+"%",transition:"width .5s"}})
      ])
    ]);
  }));

  return el("div",null,[summary,el("h3",{style:{fontSize:"14px",fontWeight:"700",color:"#64748b",marginBottom:"12px"}},"유형별 진행률"),typeRows2,el("div",{style:{background:"#f8fafc",borderRadius:"14px",padding:"14px",marginTop:"14px"}},[p("총 시도: "+totalAttempts+"회 · 총 정답: "+totalCorrect+"회",{fontSize:"13px",color:"#374151"})])]);
}

function renderWrongTab(){
  const wrongCards=S.cards.filter(c=>{
    const p=S.progress[c.id];
    return p&&p.attempts>=2&&(p.correct/p.attempts)<0.5;
  }).sort((a,b)=>{
    const pa=S.progress[a.id],pb=S.progress[b.id];
    return(pa.correct/pa.attempts)-(pb.correct/pb.attempts);
  });

  if(!wrongCards.length)return p("오답이 많은 문제가 없습니다 🎉",{color:"#94a3b8",textAlign:"center",padding:"32px 0",fontSize:"14px"});

  return el("div",null,[
    p("정답률 50% 미만 문제 ("+wrongCards.length+"개)",{fontSize:"13px",color:"#64748b",marginBottom:"12px"}),
    el("div",{style:{maxHeight:"50vh",overflowY:"auto"}},wrongCards.map(c=>{
      const prog=S.progress[c.id];
      const rate=Math.round((prog.correct/prog.attempts)*100);
      const tc=typeColor(c.type);
      return el("div",{style:{border:"1px solid #fee2e2",borderRadius:"14px",padding:"12px",marginBottom:"8px",background:"#fff"}},[
        el("div",{style:{display:"flex",alignItems:"center",gap:"6px",marginBottom:"6px"}},[
          el("span",{className:"tag",style:{background:tc[0],color:tc[1],fontSize:"10px"}},c.type||"기타"),
          el("span",{style:{fontSize:"11px",color:"#dc2626",fontWeight:"700"}},rate+"% 정답률"),
          el("span",{style:{fontSize:"11px",color:"#94a3b8"}},prog.attempts+"회 시도")
        ]),
        p(c.question,{fontSize:"13px",color:"#1e293b",lineHeight:"1.5"}),
        el("div",{style:{marginTop:"6px",background:"#fef2f2",borderRadius:"8px",padding:"6px 10px"}},[
          p("A: "+c.answer,{fontSize:"12px",color:"#374151",lineHeight:"1.4"})
        ])
      ]);
    }))
  ]);
}

function renderDone(){
  const cards=S.session?.cards||[];
  const correct=S.session?.sessionCorrect||0;
  const pct=cards.length?(correct/cards.length)*100:0;
  return div("page gbg",[
    div("card card-sm",{style:{margin:"80px auto",textAlign:"center"}},[
      p(pct>=80?"🏆":pct>=50?"👍":"📚",{fontSize:"60px",marginBottom:"12px"}),
      el("h2",{style:{fontSize:"22px",fontWeight:"800",color:"#1e293b",marginBottom:"6px"}},"세션 완료!"),
      p(cards.length+"문제 중 "+correct+"문제 정답 ("+Math.round(pct)+"%)",{color:"#64748b",marginBottom:"20px"}),
      el("div",{style:{background:"#f1f5f9",borderRadius:"99px",height:"14px",marginBottom:"24px"}},[
        el("div",{style:{background:pct>=80?"#22c55e":pct>=50?"#f59e0b":"#ef4444",height:"14px",borderRadius:"99px",width:pct+"%",transition:"width .8s"}})
      ]),
      el("div",{style:{display:"flex",gap:"10px"}},[
        btn("🔄 다시 풀기","#4f46e5","#fff",startStudy,{flex:"1",borderRadius:"14px"}),
        btn("🏠 홈으로","#f1f5f9","#374151",()=>set({screen:"home"}),{flex:"1",borderRadius:"14px"})
      ])
    ])
  ]);
}

// ── 통계 계산
function calcStats(){
  const today=todayStr();
  const total=S.cards.length;
  const mastered=S.cards.filter(c=>(S.progress[c.id]||{correct:0}).correct>=PASS).length;
  const dueToday=S.cards.filter(c=>{const p=S.progress[c.id];if(!p)return true;if((p.correct||0)>=PASS)return false;return(p.nextDate||"0000-00-00")<=today}).length;
  const byType={};
  S.cards.forEach(c=>{const t=c.type||"기타";if(!byType[t])byType[t]={total:0,mastered:0};byType[t].total++;if((S.progress[c.id]||{correct:0}).correct>=PASS)byType[t].mastered++});
  return{total,mastered,dueToday,byType};
}

function calcStreak(){
  let streak=0,d=new Date();
  while(true){
    const s=d.toISOString().split("T")[0];
    if(S.studyLog[s]&&S.studyLog[s].total>0){streak++;d.setDate(d.getDate()-1)}
    else break;
    if(streak>365)break;
  }
  return streak;
}

// ── 메인 렌더
function render(){
  const app=document.getElementById("app");app.innerHTML="";
  if(S.loading){app.innerHTML='<div class="page gbg"><div class="spinner"></div></div>';return}
  const screens={login:renderLogin,apikey:renderApiKey,home:renderHome,study:renderStudy,memo:renderMemo,add:renderAddEdit,manage:renderManage,stats:renderStats,done:renderDone};
  const fn=screens[S.screen];if(fn)app.appendChild(fn());
}

// ── 인증 감시
onAuthStateChanged(auth,async user=>{
  if(user){S.user=user;await loadData(user)}
  else set({screen:"login",user:null,loading:false});
});

render();
</script>
