<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#1a237e"/>
<title>⚖️ 법학 플래시카드</title>
<style>
:root{--bg1:#1a237e;--bg2:#283593;--teal1:#0d5c4e;--teal2:#1a7a67;--pur1:#3b0764;--pur2:#6d28d9}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo',sans-serif;min-height:100vh;background:var(--bg1)}
button{cursor:pointer;border:none;font-family:inherit;outline:none;transition:opacity .15s}
button:active{opacity:.7}
textarea,input,select{font-family:inherit;outline:none}
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px 40px}
.gbg{background:linear-gradient(135deg,var(--bg1),var(--bg2))}
.tbg{background:linear-gradient(135deg,var(--teal1),var(--teal2))}
.pbg{background:linear-gradient(135deg,var(--pur1),var(--pur2))}
.dbg{background:linear-gradient(135deg,#0f172a,#1e293b)}
.card{background:#fff;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.25);padding:28px;width:100%;max-width:520px}
.card-sm{max-width:440px}
.btn{border-radius:14px;padding:13px 16px;font-weight:700;font-size:15px;width:100%;display:block;text-align:center}
.inp{width:100%;border:2px solid #e5e7eb;border-radius:14px;padding:12px 16px;font-size:14px;background:#fff;transition:border-color .2s}
.inp:focus{border-color:#a5b4fc}
.tag{font-size:11px;font-weight:700;padding:4px 12px;border-radius:99px;display:inline-block}
.kw{background:rgba(255,255,255,.2);color:#fff;font-size:11px;padding:4px 12px;border-radius:99px;display:inline-block}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.flip-box{perspective:1200px}
.flip-inner{transition:transform .5s;-webkit-transition:-webkit-transform .5s;transform-style:preserve-3d;-webkit-transform-style:preserve-3d;position:relative;width:100%;height:100%}
.flip-inner.flipped{transform:rotateY(180deg);-webkit-transform:rotateY(180deg)}
.flip-f,.flip-b{-webkit-backface-visibility:hidden;backface-visibility:hidden;position:absolute;inset:0;border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;overflow:auto;text-align:center}
.flip-b{transform:rotateY(180deg);-webkit-transform:rotateY(180deg)}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 22px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-cell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.streak{background:linear-gradient(135deg,#ff6b35,#f7931e);color:#fff;border-radius:16px;padding:14px 20px;display:flex;align-items:center;gap:12px;margin-bottom:12px}
.menu-btn{border-radius:20px;padding:18px;display:flex;align-items:center;gap:14px;width:100%;text-align:left;margin-bottom:10px;font-weight:700;font-size:16px}
.menu-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
</style>
</head>

const PASS=5,SESSION_SIZE=5,APIKEY_STORE="law_fc_apikey";

// ── 앱 상태
let S={cards:[],progress:{},studyLog:{},screen:"loading",session:null,memo:null,editCard:null,loading:true,statsTab:"calendar"};
function set(p){Object.assign(S,p);render()}

// ── Firestore 저장/로드 (myplanner 방식 — 고정 문서 ID)
let saveTimer=null;
function debouncedSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveAll,800)}

async function saveAll(){
  try{
    // 카드 목록
    await db.collection("flashcard").doc(DOC_CARDS).set({cards:S.cards});
    // 진행도
    await db.collection("flashcard").doc(DOC_PROGRESS).set({progress:S.progress});
    // 학습 로그
    await db.collection("flashcard").doc(DOC_LOG).set({log:S.studyLog});
    // myplanner 연동
    await db.collection("studySync").doc("shared").set({log:S.studyLog,lastUpdated:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
  }catch(e){console.error("Save failed:",e);toast("저장 오류: "+e.message)}
}

async function loadAll(){
  try{
    const[cSnap,pSnap,lSnap]=await Promise.all([
      db.collection("flashcard").doc(DOC_CARDS).get(),
      db.collection("flashcard").doc(DOC_PROGRESS).get(),
      db.collection("flashcard").doc(DOC_LOG).get()
    ]);
    // 카드: 없으면 초기 데이터 삽입
    if(cSnap.exists&&cSnap.data().cards&&cSnap.data().cards.length>0){
      S.cards=cSnap.data().cards;
    }else{
      S.cards=INITIAL_CARDS.map(function(c,i){return Object.assign({id:"card_"+i},c)});
      await db.collection("flashcard").doc(DOC_CARDS).set({cards:S.cards});
    }
    S.progress=pSnap.exists?(pSnap.data().progress||{}):{};
    S.studyLog=lSnap.exists?(lSnap.data().log||{}):{};
    set({loading:false,screen:APIKEY?"home":"apikey"});
  }catch(e){
    console.error("Load failed:",e);
    // Firebase 실패 시 로컬 데이터로 폴백
    S.cards=INITIAL_CARDS.map(function(c,i){return Object.assign({id:"card_"+i},c)});
    set({loading:false,screen:APIKEY?"home":"apikey"});
  }
}

// ── 유틸
function toast(msg){var t=document.getElementById("toast");t.textContent=msg;t.style.opacity="1";clearTimeout(t._t);t._t=setTimeout(function(){t.style.opacity="0"},2500)}
function todayStr(){return new Date().toISOString().split("T")[0]}
function speak(text){try{if(!window.speechSynthesis)return;window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(text);u.lang="ko-KR";u.rate=0.88;setTimeout(function(){window.speechSynthesis.speak(u)},100)}catch(e){}}
function typeColor(t){var m={객관식:["#ede9fe","#6d28d9"],판례:["#fef3c7","#b45309"],요건:["#dbeafe","#1d4ed8"],기타:["#f3f4f6","#374151"]};return m[t]||m["기타"]}
function sm2(correct,interval,ef){
  if(!correct)return{interval:1,ef:Math.max(1.3,(ef||2.5)-.2),next:daysAdd(1)};
  var ni=!interval?1:interval===1?3:Math.round(interval*(ef||2.5));
  return{interval:ni,ef:Math.min(3.0,(ef||2.5)+.1),next:daysAdd(ni)};
}
function daysAdd(d){var dt=new Date();dt.setDate(dt.getDate()+d);dt.setHours(0,0,0,0);return dt.toISOString().split("T")[0]}

// ── 카드 선발
function pickCards(cards,prog){
  var today=todayStr();
  var due=cards.filter(function(c){
    var p=prog[c.id];
    if(!p)return true;
    if((p.correct||0)>=PASS)return false;
    return(p.nextDate||"0000-00-00")<=today;
  });
  if(!due.length)return[];
  var byType={};
  due.forEach(function(c){var t=c.type||"기타";if(!byType[t])byType[t]=[];byType[t].push(c)});
  var sel=new Set();var types=Object.keys(byType);var i=0;
  while(sel.size<Math.min(SESSION_SIZE,due.length)){
    var t=types[i%types.length];
    var pool=byType[t].filter(function(c){return!sel.has(c.id)});
    if(pool.length){pool.sort(function(a,b){return((prog[a.id]||{correct:0}).correct)-((prog[b.id]||{correct:0}).correct)});sel.add(pool[0].id)}
    i++;if(i>types.length*30)break;
  }
  return due.filter(function(c){return sel.has(c.id)}).sort(function(){return Math.random()-.5});
}

// ── AI 채점
function judgeAnswer(q,a,ua,kw,cb){
  var prompt="당신은 법학 시험 채점관입니다.\n문제: "+q+"\n모범답안: "+a+"\n관련 키워드: "+(kw||"없음")+"\n수험생 답변: "+ua+"\n채점 기준: 핵심 키워드와 개념 포함 시 정답, 완벽한 문장 불필요, 법적 의미 동일 시 정답.\n반드시 아래 JSON만 응답 (코드블록 없이):\n{\"correct\":true,\"feedback\":\"피드백\",\"missing\":\"빠진개념\"}";
  var xhr=new XMLHttpRequest();
  xhr.open("POST","https://api.anthropic.com/v1/messages",true);
  xhr.setRequestHeader("Content-Type","application/json");
  xhr.setRequestHeader("x-api-key",APIKEY);
  xhr.setRequestHeader("anthropic-version","2023-06-01");
  xhr.setRequestHeader("anthropic-dangerous-direct-browser-access","true");
  xhr.onreadystatechange=function(){
    if(xhr.readyState!==4)return;
    try{var data=JSON.parse(xhr.responseText);var text=(data.content||[]).map(function(c){return c.text||""}).join("");cb(null,JSON.parse(text.replace(/```json|```/g,"").trim()))}
    catch(e){cb(null,{correct:false,feedback:"채점 오류",missing:""})}
  };
  xhr.onerror=function(){cb(null,{correct:false,feedback:"네트워크 오류",missing:""})};
  xhr.send(JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,messages:[{role:"user",content:prompt}]}));
}

// ── 액션
function startStudy(starOnly){
  var src=starOnly?S.cards.filter(function(c){return c.starred}):S.cards;
  var cards=pickCards(src,S.progress);
  if(!cards.length){toast(starOnly?"⭐ 북마크된 복습 문제가 없습니다!":"🎉 오늘 복습할 문제가 없습니다!");return}
  set({screen:"study",session:{cards:cards,idx:0,answered:false,judging:false,result:null,confirmed:false,finalCorrect:null,showHint:false,userInput:"",sessionCorrect:0,starOnly:!!starOnly}});
}
function startMemo(starOnly){
  var pool=starOnly?S.cards.filter(function(c){return c.starred}):S.cards.slice();
  if(!pool.length){toast(starOnly?"⭐ 북마크된 카드가 없습니다!":"문제가 없습니다.");return}
  pool.sort(function(){return Math.random()-.5});
  set({screen:"memo",memo:{cards:pool,idx:0,flipped:false,starOnly:!!starOnly}});
  setTimeout(function(){speak(pool[0].question)},400);
}
function submitAnswer(){
  var s=S.session;
  if(!s.userInput.trim()||s.judging)return;
  s.judging=true;render();
  var card=s.cards[s.idx];
  judgeAnswer(card.question,card.answer,s.userInput,card.keywords,function(err,result){
    s.judging=false;s.answered=true;s.result=result;s.confirmed=false;s.finalCorrect=null;render();
  });
}
function confirmAnswer(correct){
  var s=S.session;var card=s.cards[s.idx];
